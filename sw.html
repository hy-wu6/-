            if (d.children) {
                d.children.forEach(expand);
            }
        }
        
        function update(source) {
            const treeData = tree(root);
            let nodes = treeData.descendants();
            const links = treeData.links();
            
            // 过滤补充节点（根据模式）
            if (!showSupplements && !reciteMode) {
                nodes = nodes.filter(d => d.data.isOriginal);
            }
            
            nodes.forEach(d => { d.y = d.depth * 280; });
            
            const node = g.selectAll('g.node')
                .data(nodes, d => d.id || (d.id = ++i));
            
            const nodeEnter = node.enter().append('g')
                .attr('class', d => d.data.isSupplement ? 'node supplement-node' : 'node')
                .attr("transform", d => `translate(${source.y0},${source.x0})`)
                .on('click', click)
                .on('mouseover', showTooltip)
                .on('mouseout', hideTooltip);
            
            // 圆圈
            nodeEnter.append('circle')
                .attr('class', d => d.data.class || 'root')
                .attr('r', 1e-6)
                .style("fill", d => d._children ? getNodeColor(d.data.class) : "#fff")
                .style("stroke", d => getNodeColor(d.data.class));
            
            // 文字
            nodeEnter.append('text')
                .attr("dy", ".35em")
                .attr("x", d => d.children || d._children ? -18 : 18)
                .attr("text-anchor", d => d.children || d._children ? "end" : "start")
                .text(d => d.data.name)
                .attr("class", d => {
                    if (d.data.isSupplement) return "label-supplement";
                    return "label-original";
                })
                .style("font-size", d => {
                    if (d.depth === 0) return "20px";
                    if (d.depth === 1) return "17px";
                    if (d.data.isSupplement) return "12px";
                    return "14px";
                });
            
            const nodeUpdate = node.merge(nodeEnter).transition().duration(duration)
                .attr("transform", d => `translate(${d.y},${d.x})`);
            
            nodeUpdate.select('circle')
                .attr('r', d => {
                    if (d.depth === 0) return 15;
                    if (d.data.isSupplement) return 5;
                    return d.depth === 1 ? 10 : 7;
                })
                .style("fill", d => d._children ? getNodeColor(d.data.class) : "#fff");
            
            const nodeExit = node.exit().transition().duration(duration)
                .attr("transform", d => `translate(${source.y},${source.x})`)
                .remove();
            
            nodeExit.select('circle').attr('r', 1e-6);
            nodeExit.select('text').style('fill-opacity', 1e-6);
            
            const link = g.selectAll('path.link')
                .data(links, d => d.target.id);
            
            const linkEnter = link.enter().insert('path', "g")
                .attr("class", "link")
                .attr('d', d => {
                    const o = {x: source.x0, y: source.y0};
                    return diagonal(o, o);
                })
                .style("stroke", d => getNodeColor(d.target.data.class))
                .style("stroke-opacity", d => d.target.data.isSupplement ? 0.3 : 0.7)
                .style("stroke-width", d => d.target.data.isSupplement ? "2px" : "3px")
                .style("stroke-dasharray", d => d.target.data.isSupplement ? "5,5" : "none");
            
            const linkUpdate = link.merge(linkEnter).transition().duration(duration)
                .attr('d', d => diagonal(d.source, d.target));
            
            link.exit().transition().duration(duration)
                .attr('d', d => {
                    const o = {x: source.x, y: source.y};
                    return diagonal(o, o);
                })
                .remove();
            
            nodes.forEach(d => {
                d.x0 = d.x;
                d.y0 = d.y;
            });
        }
        
        function diagonal(s, d) {
            return `M ${s.y} ${s.x}
                    C ${(s.y + d.y) / 2} ${s.x},
                      ${(s.y + d.y) / 2} ${d.x},
                      ${d.y} ${d.x}`;
        }
        
        function getNodeColor(className) {
            const colors = {
                'c1': '#ff6b6b', 'c2': '#4facfe', 'c3': '#f093fb',
                'c4': '#fa709a', 'c5': '#feca57', 'c6': '#a29bfe',
                'c7': '#00d2d3', 'c8': '#54a0ff', 'c9': '#8395a7',
                'root': '#ffffff', 'mnemonic': '#ff9ff3'
            };
            return colors[className] || '#ffffff';
        }
        
        function click(event, d) {
            if (d.children) {
                d._children = d.children;
                d.children = null;
            } else {
                d.children = d._children;
                d._children = null;
            }
            update(d);
            centerNode(d);
        }
        
        function centerNode(source) {
            const t = d3.zoomTransform(svg.node());
            let x = -source.y0;
            let y = -source.x0;
            x = x * t.k + width/5;
            y = y * t.k + height/2;
            svg.transition().duration(750).call(d3.zoom().transform, d3.zoomIdentity.translate(x,y).scale(1));
        }
        
        function showTooltip(event, d) {
            const tooltip = document.getElementById('tooltip');
            let content = '';
            
            if (d.data.isOriginal) {
                content += '<span class="tooltip-tag tag-original">✓ 原文内容</span><br>';
            } else {
                content += '<span class="tooltip-tag tag-supplement">搜索补充</span><br>';
            }
            
            content += `<div class="tooltip-title">${d.data.name}</div>`;
            
            if (d.data.highlight) {
                content += `<div class="tooltip-note">💡 ${d.data.highlight}</div>`;
            }
            if (d.data.note) {
                content += `<div class="tooltip-note">⚠️ ${d.data.note}</div>`;
            }
            
            tooltip.innerHTML = content;
            tooltip.style.left = (event.pageX + 15) + 'px';
            tooltip.style.top = (event.pageY - 10) + 'px';
            tooltip.style.opacity = 1;
        }
        
        function hideTooltip() {
            document.getElementById('tooltip').style.opacity = 0;
        }
        
        // 模式切换
        window.toggleMode = function() {
            showSupplements = !showSupplements;
            document.getElementById('modeDot').classList.toggle('study');
            document.getElementById('modeText').textContent = showSupplements ? '学习模式（显示补充）' : '纯净模式（仅原文）';
            update(root);
        };
        
        // 背诵模式（隐藏所有补充，只显示口诀和9大类）
        window.toggleRecite = function() {
            reciteMode = !reciteMode;
            const btn = document.querySelector('.btn-recite');
            if (reciteMode) {
                btn.textContent = '退出背诵';
                btn.style.background = '#e53e3e';
                document.body.classList.add('hide-supplements');
            } else {
                btn.textContent = '背诵模式';
                btn.style.background = 'linear-gradient(135deg, #ed8936 0%, #dd6b20 100%)';
                document.body.classList.remove('hide-supplements');
            }
            update(root);
        };
        
        // 导出PDF（简化版）
        window.exportPDF = function() {
            window.print();
        };
    </script>
</body>
</html>
